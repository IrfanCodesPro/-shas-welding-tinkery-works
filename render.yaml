services:
  - type: web
    name: shas-welding-tinkery-works
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
